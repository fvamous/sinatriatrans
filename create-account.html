    <main class="pt-20 py-16">
        <div class="container mx-auto px-4">
            <h1 class="text-5xl font-extrabold text-center text-gray-800 mb-12">
                Daftar Akun Baru
            </h1>
            <div class="bg-white p-8 rounded-xl shadow-lg max-w-md mx-auto">
                <form id="register-form" class="space-y-6">
                    <div>
                        <label for="full-name" class="block text-gray-700 text-sm font-bold mb-2">
                            Nama Lengkap
                        </label>
                        <input
                            type="text"
                            id="full-name"
                            name="full-name"
                            class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200"

                        />

                    <div>

                            Email
                        </label>

                            type="email"

                            class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200"
                            placeholder="email@example.com"
                            required
                        />
                    </div>
                    <div class="relative">
                        <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
                            Kata Sandi
                        </label>
                        <input
                            type="password"
                            id="password"

                            class="shadow appearance-none border rounded-lg w-full py-3 px-4 pr-10 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200"
                            placeholder="Minimal 6 karakter"
                            required
                        />
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer top-7" onclick="togglePasswordVisibility('password')">
                            <i id="togglePasswordIcon" class="fas fa-eye text-gray-500 hover:text-gray-700"></i>
                        </span>
                    </div>
                    <div class="relative">
                        <label for="confirm-password" class="block text-gray-700 text-sm font-bold mb-2">
                            Konfirmasi Kata Sandi
                        </label>
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            class="shadow appearance-none border rounded-lg w-full py-3 px-4 pr-10 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200"
                            placeholder="Ulangi Kata Sandi Anda"
                            required
                        />
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer top-7" onclick="togglePasswordVisibility('confirm-password')">
                            <i id="toggleConfirmPasswordIcon" class="fas fa-eye text-gray-500 hover:text-gray-700"></i>
                        </span>
                    </div>
                    <button
                        type="submit"
                        class="bg-primary hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-300 ease-in-out transform hover:scale-105 w-full"

    <script>
        // Custom Message Box Logic
        const messageBox = document.getElementById('messageBox');
        const messageBoxOverlay = document.getElementById('messageBoxOverlay');
        const messageBoxContent = document.getElementById('messageBoxContent');
        const messageBoxClose = document.getElementById('messageBoxClose');

        function showMessageBox(message) {
            messageBoxContent.textContent = message;
            messageBox.style.display = 'block';
            messageBoxOverlay.style.display = 'block';
        }

        messageBoxClose.addEventListener('click', () => {
            messageBox.style.display = 'none';
            messageBoxOverlay.style.display = 'none';
        });

        // Navbar Mobile Toggle
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
            const mobileMenuIconOpen = document.getElementById('mobile-menu-icon-open');
            const mobileMenuIconClose = document.getElementById('mobile-menu-icon-close');
            const mobileMenuItems = document.querySelectorAll('.mobile-menu-item');

            mobileMenuButton.addEventListener('click', () => {
                const isHidden = mobileMenuOverlay.classList.contains('hidden');
                if (isHidden) {
                    mobileMenuOverlay.classList.remove('hidden');
                    mobileMenuIconOpen.classList.remove('hidden');
                    mobileMenuIconClose.classList.add('hidden');
                } else {
                    mobileMenuOverlay.classList.add('hidden');
                    mobileMenuIconOpen.classList.add('hidden');
                    mobileMenuIconClose.classList.remove('hidden');
                }
            });

            mobileMenuItems.forEach(item => {
                item.addEventListener('click', () => {
                    mobileMenuOverlay.classList.add('hidden');
                    mobileMenuIconOpen.classList.add('hidden');
                    mobileMenuIconClose.classList.remove('hidden');
                });
            });

            // Function to toggle password visibility
            window.togglePasswordVisibility = function(fieldId) {
                const passwordField = document.getElementById(fieldId);
                const toggleIcon = passwordField.nextElementSibling.querySelector('i'); // Get the <i> element inside the next sibling (span)

                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordField.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            };

            // Handle form submission (dummy registration)
            const registerForm = document.getElementById('register-form');
            if (registerForm) {
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const fullName = document.getElementById('full-name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    if (password !== confirmPassword) {
                        showMessageBox('Kata sandi dan konfirmasi kata sandi tidak cocok.');
                        return;
                    }

                    // Dummy registration logic
                    showMessageBox(`Pendaftaran berhasil untuk ${fullName} (${email})! Silakan login.`);
                    registerForm.reset(); // Reset the form
                    // In a real app, you would send this data to a server and then redirect to login or dashboard
                    // window.location.href = 'login-page.html';
                });
            }

            // Set current year in footer
            const currentYearSpan = document.getElementById('current-year');
            if (currentYearSpan) {
                currentYearSpan.textContent = new Date().getFullYear();
            }
        });
    </script>
